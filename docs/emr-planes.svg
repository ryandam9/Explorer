<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 660" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6470"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b7791f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="660" fill="#ffffff"/>
  <text x="490" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1b1f24">The three planes of EMR access</text>
  <text x="490" y="62" text-anchor="middle" font-size="13" fill="#5b6470">What aws_explorer can read, and how — only the first two have an AWS API</text>

  <!-- client -->
  <rect x="40" y="270" width="180" height="120" rx="10" fill="#1b2733" stroke="#0f1620" stroke-width="1.5"/>
  <text x="130" y="318" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">aws_explorer</text>
  <text x="130" y="340" text-anchor="middle" font-size="11.5" fill="#aeb9c4">your laptop / CI</text>
  <text x="130" y="360" text-anchor="middle" font-size="11.5" fill="#aeb9c4">runs anywhere</text>

  <!-- ===== top group: reachable from anywhere ===== -->
  <text x="300" y="92" font-size="13" font-weight="700" fill="#2f855a">✓ Reachable from anywhere — IAM credentials only</text>

  <!-- Control plane lane -->
  <rect x="300" y="104" width="640" height="118" rx="10" fill="#ebf3fb" stroke="#3182ce" stroke-width="1.5"/>
  <text x="320" y="132" font-size="15" font-weight="700" fill="#1f5a8c">1 · Control plane</text>
  <text x="320" y="153" font-size="12" fill="#33597a">AWS API · elasticmapreduce:List* / Describe*</text>
  <text x="320" y="183" font-size="12.5" fill="#1b1f24">clusters · steps · instances · instance fleets/groups</text>
  <text x="320" y="203" font-size="12.5" fill="#1b1f24">bootstrap actions · security configurations · release label · installed apps</text>
  <text x="924" y="132" text-anchor="end" font-size="11" font-weight="700" fill="#3182ce">AXE-033/034/035</text>

  <!-- History plane lane -->
  <rect x="300" y="238" width="640" height="118" rx="10" fill="#e6f6f4" stroke="#2c9d8f" stroke-width="1.5"/>
  <text x="320" y="266" font-size="15" font-weight="700" fill="#1c6b62">2 · History plane</text>
  <text x="320" y="287" font-size="12" fill="#22796f">AWS-mediated · presigned URL + S3 / CloudWatch log archive</text>
  <text x="320" y="317" font-size="12.5" fill="#1b1f24">Spark History · YARN Timeline · Tez UI  (GetPersistentAppUIPresignedURL)</text>
  <text x="320" y="337" font-size="12.5" fill="#1b1f24">step / container / daemon logs in s3://&lt;bucket&gt;/&lt;cluster-id&gt;/…</text>
  <text x="924" y="266" text-anchor="end" font-size="11" font-weight="700" fill="#2c9d8f">AXE-036/037</text>

  <!-- arrows client -> lane 1 and lane 2 -->
  <path d="M220 318 C 255 250, 262 190, 298 163" fill="none" stroke="#5b6470" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M220 340 C 255 320, 262 300, 298 297" fill="none" stroke="#5b6470" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ===== boundary divider ===== -->
  <line x1="40" y1="392" x2="940" y2="392" stroke="#cbd2d9" stroke-width="1.5" stroke-dasharray="7 6"/>
  <text x="40" y="386" font-size="11.5" font-weight="700" fill="#9aa4af">— — AWS API boundary — —</text>

  <!-- bottom group: on-cluster -->
  <text x="300" y="430" font-size="13" font-weight="700" fill="#b7791f">⚠ Requires network reachability into the cluster VPC — opt-in (AXE-039)</text>

  <!-- On-cluster plane lane -->
  <rect x="300" y="442" width="640" height="160" rx="10" fill="#fdf3e3" stroke="#dd9b34" stroke-width="1.5"/>
  <text x="320" y="470" font-size="15" font-weight="700" fill="#9a6512">3 · On-cluster plane</text>
  <text x="320" y="491" font-size="12" fill="#a8741f">NO AWS API · HTTP REST against daemons on the primary node</text>
  <text x="320" y="521" font-size="12.5" fill="#1b1f24">live YARN apps      ResourceManager REST   :8088</text>
  <text x="320" y="543" font-size="12.5" fill="#1b1f24">HBase tables        HBase REST :8080 · Master UI :16010</text>
  <text x="320" y="565" font-size="12.5" fill="#1b1f24">Oozie workflows     Oozie REST            :11000</text>
  <text x="320" y="589" font-size="11.5" font-style="italic" fill="#9a6512">reached only through the opt-in connection layer (see connection-modes diagram)</text>
  <text x="924" y="470" text-anchor="end" font-size="11" font-weight="700" fill="#dd9b34">AXE-040/041/042</text>

  <!-- arrow client -> lane 3 via connection layer -->
  <path d="M130 390 C 130 470, 200 520, 298 520" fill="none" stroke="#b7791f" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowAmber)"/>
  <text x="150" y="455" font-size="10.5" font-weight="700" fill="#b7791f">opt-in</text>
  <text x="150" y="469" font-size="10.5" font-weight="700" fill="#b7791f">connection</text>
</svg>
