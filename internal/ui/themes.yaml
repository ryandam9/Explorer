# Built-in theme palettes. This file is the single source of truth for the
# default colors and is compiled into the binary via //go:embed (see theme.go).
#
# Colors come from the "feathers" palettes — color schemes inspired by the
# plumage of Australian birds (https://github.com/shandiya/feathers, the same
# data rendered at https://ryandam.net/demos/feathers_palettes/). Each palette's
# distinct hues are mapped onto the granular roles below.
#
# Order is significant: callers and tests refer to themes by index, so keep
# spotted-pardalote first. Any role can be overridden per-theme by the user's
# config.yaml under ui.themes.<name>; an empty granular role falls back to a
# related role at render time (see the accessors in theme.go).
#
# The comment above each theme lists the source feathers palette.

# feathers: #feca00 #d36328 #cb0300 #b4b9b3 #424847 #000100
- name: spotted-pardalote
  heading: "#feca00"
  text: "#b4b9b3"
  background: ""
  border: "#424847"
  borderFocus: "#feca00"
  highlight: "#cb0300"
  highlightText: "#feca00"
  muted: "#d36328"
  tableHeader: "#d36328"
  tableHeaderLine: "#424847"
  statusBarBg: "#feca00"
  statusBarText: "#000100"
  accent: "#d36328"
  error: "#FF5555"
  warning: "#FFAA00"

