app:
    defaultoutput: table
    defaultmode: cli
    timeoutseconds: 30
    maxconcurrency: 8
    downloaddir: ""
aws:
    profile: default
    authmethod: auto
    regions:
        - us-east-1
    allregions: true
    sts:
        rolearn: ""
        sessionname: ""
        externalid: ""
        mfaserial: ""
        duration: 0
    static:
        accesskeyid: ""
        secretaccesskey: ""
        sessiontoken: ""
    retry:
        maxattempts: 0
        mode: ""
