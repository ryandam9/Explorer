app:
    defaultoutput: table
    defaultmode: cli
    timeoutseconds: 30
    maxconcurrency: 8
    # Directory the S3 browser downloads objects into when you press "D".
    # A leading "~" is expanded to your home directory; empty means the current
    # working directory. The directory is created automatically if it is missing.
    downloaddir: ""
aws:
    profile: default
    authmethod: auto
    regions:
        - us-east-1
    allregions: false
    sts:
        rolearn: ""
        sessionname: ""
        externalid: ""
        mfaserial: ""
        duration: 0
    static:
        accesskeyid: ""
        secretaccesskey: ""
        sessiontoken: ""
    # Retry tuning for every AWS API call. Raise maxattempts and switch to the
    # "adaptive" mode if large scans hit throttling (RequestLimitExceeded).
    retry:
        # Total attempts per API call (1 = no retries). 0 uses the SDK default (3).
        maxattempts: 0
        # "standard" (default) or "adaptive" (adds client-side rate limiting).
        mode: ""
