app:
  defaultOutput: table
  defaultMode: cli
  timeoutSeconds: 30
  maxConcurrency: 8

aws:
  # authMethod controls how credentials are obtained. Valid values:
  #   auto    - AWS SDK default chain (env vars → ~/.aws → EC2/ECS metadata)  [default]
  #   profile - named profile from ~/.aws/credentials or ~/.aws/config
  #   env     - only AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY env vars
  #   static  - plaintext credentials in this file (see aws.static below)
  #   sts     - assume an IAM role via STS (see aws.sts below)
  authMethod: auto
  profile: default

  # STS AssumeRole — used when authMethod is "sts".
  # Base credentials (profile / env / default chain) are used to call sts:AssumeRole.
  sts:
    roleArn: ""           # required, e.g. arn:aws:iam::123456789012:role/MyRole
    sessionName: ""       # optional; defaults to "aws-explorer"
    externalId: ""        # optional; required by some cross-account trust policies
    mfaSerial: ""         # optional; ARN of your MFA device
    durationSeconds: 0    # optional; 0 means AWS default (3600 s)

  # Static credentials — used when authMethod is "static".
  # Avoid committing real keys; prefer environment variables or profiles instead.
  static:
    accessKeyId: ""
    secretAccessKey: ""
    sessionToken: ""      # optional; needed for temporary credentials

  # Set to true to scan all available AWS regions, or list specific regions below
  allRegions: false
  regions:
    - us-east-1

services:
  ec2:
    enabled: true
  s3:
    enabled: true
  rds:
    enabled: true
  iam:
    enabled: true
  dynamodb:
    enabled: true
  lambda:
    enabled: true
  emr:
    enabled: true
  ecs:
    enabled: true
  eks:
    enabled: true
  elbv2:
    enabled: true
  secretsmanager:
    enabled: true
  sqs:
    enabled: true
  sns:
    enabled: true
  cloudwatch:
    enabled: true
  route53:
    enabled: true

filters:
  regions: []
  tags: {}
  states: []

output:
  format: table
  includeDetails: false

# ── UI / Theme configuration ──────────────────────────────────────────────────
#
# theme: name of the active theme (one of the names below).
# themes: per-theme color role overrides.  Any role left empty falls back to
#         the built-in default for that theme.
#
# Color roles
#   heading       titles, section headers
#   text          body text / foreground
#   background    panel background (leave empty for terminal default)
#   border        panel borders
#   highlight     selected / highlighted item background
#   highlightText text on selected / highlighted items
#   muted         de-emphasised / secondary text
#   error         error messages and indicators
#   warning       warning messages and indicators
#
ui:
  theme: spotted-pardalote

  themes:
    spotted-pardalote:
      heading: "#6260FF"
      text: "#E4E4FF"
      background: ""
      border: "#E4E4FF"
