app:
    defaultoutput: table
    defaultmode: cli
    timeoutseconds: 30
    maxconcurrency: 8
    # Directory the S3 browser downloads objects into when you press "D".
    # A leading "~" is expanded to your home directory; empty means the current
    # working directory. The directory is created automatically if it is missing.
    downloaddir: ""
aws:
    profile: default
    authmethod: auto
    # Regions to scan. Leave empty ([]) to use the region from your active AWS
    # profile / AWS_REGION. List explicit regions to override, or add "all" to
    # scan every region.
    regions: []
    allregions: false
    sts:
        rolearn: ""
        sessionname: ""
        externalid: ""
        mfaserial: ""
        duration: 0
    static:
        accesskeyid: ""
        secretaccesskey: ""
        sessiontoken: ""
services:
    cloudwatch:
        enabled: true
        resources: {}
    dynamodb:
        enabled: true
        resources: {}
    ec2:
        enabled: true
        resources: {}
    ecs:
        enabled: true
        resources: {}
    eks:
        enabled: true
        resources: {}
    elbv2:
        enabled: true
        resources: {}
    emr:
        enabled: true
        resources: {}
    iam:
        enabled: true
        resources: {}
    lambda:
        enabled: true
        resources: {}
    rds:
        enabled: true
        resources: {}
    route53:
        enabled: true
        resources: {}
    s3:
        enabled: true
        resources: {}
    secretsmanager:
        enabled: true
        resources: {}
    sns:
        enabled: true
        resources: {}
    sqs:
        enabled: true
        resources: {}
filters:
    regions: []
    tags: {}
    states: []
output:
    format: table
    includedetails: false
    fields: []
