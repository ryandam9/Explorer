# `summary` command options.
summary:
    # commonServices extends the coverage advisory — the "services with nothing
    # shown" list under the summary table (press c in --tui). The key is the AWS
    # service as it appears in ARNs / collector names (lower-case, e.g.
    # "route53"), the value is the friendly label shown to you. Entries are
    # merged on top of the built-in catalog, so this only adds services; an
    # empty map (the default) leaves the built-in list unchanged. Example:
    #   commonServices:
    #     apprunner: App Runner
    #     sagemaker: SageMaker
    #
    # The list below covers the AWS services that have NO typed collector, so
    # their resources are only discovered through the tag sweep. Keys are the ARN
    # service namespace the sweep reports (e.g. "es" for OpenSearch). Services
    # whose ARN namespace is already typed are intentionally omitted — VPC, EBS,
    # Transit Gateway report as "ec2"; Aurora, Neptune, DocumentDB report as
    # "rds" — so they are already covered and would otherwise show as permanently
    # missing. Remove any of these via `hideservices` if they are just noise.
    commonservices:
        # Compute
        batch: AWS Batch
        elasticbeanstalk: AWS Elastic Beanstalk
        lightsail: Amazon Lightsail
        apprunner: AWS App Runner
        outposts: AWS Outposts
        imagebuilder: EC2 Image Builder
        # Storage
        fsx: Amazon FSx
        glacier: Amazon S3 Glacier
        storagegateway: AWS Storage Gateway
        backup: AWS Backup
        snowball: AWS Snow Family
        # Database
        cassandra: Amazon Keyspaces
        timestream: Amazon Timestream
        memorydb: Amazon MemoryDB
        qldb: Amazon QLDB
        # Networking & Content Delivery
        directconnect: AWS Direct Connect
        globalaccelerator: AWS Global Accelerator
        network-firewall: AWS Network Firewall
        servicediscovery: AWS Cloud Map
        vpc-lattice: Amazon VPC Lattice
        appmesh: AWS App Mesh
        # Application Integration
        appflow: Amazon AppFlow
        mq: Amazon MQ
        appsync: AWS AppSync
        swf: Amazon SWF
        airflow: Amazon MWAA
        # Analytics
        es: Amazon OpenSearch Service
        quicksight: Amazon QuickSight
        lakeformation: AWS Lake Formation
        kafka: Amazon MSK
        dataexchange: AWS Data Exchange
        datazone: Amazon DataZone
        cleanrooms: AWS Clean Rooms
        # Security, Identity & Compliance
