version: 2
updates:
  # Go module dependencies. The AWS SDK ships dozens of per-service modules, so
  # group them into one PR to avoid a flood; everything else groups separately.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      aws-sdk-go-v2:
        patterns:
          - "github.com/aws/aws-sdk-go-v2*"
          - "github.com/aws/smithy-go"
      go-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "github.com/aws/aws-sdk-go-v2*"
          - "github.com/aws/smithy-go"

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
