name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./... -count=1

  quality:
    name: Format, vet, race & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Build
        run: make build
      - name: Race + coverage
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./... -count=1
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Cross build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      # The official action checks out, installs Go from go.mod, and builds
      # govulncheck with that toolchain before scanning. The earlier manual
      # `go install ...@latest` + `govulncheck ./...` could build the scanner
      # with a different Go than the module targets, which surfaced as a usage
      # error (exit 2) rather than a clean scan.
      - id: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  lint:
    name: golangci-lint (advisory)
    runs-on: ubuntu-latest
    # Advisory until a golangci-lint release built with Go >= this module's
    # version is pinned: golangci-lint refuses to run when its own build Go is
    # older than the targeted go directive, so a toolchain-cadence mismatch
    # (not a real defect) could otherwise turn merges red. Flip
    # continue-on-error to false once a go1.26-built release is pinned here.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
